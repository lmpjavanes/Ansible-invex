---
# roles/software_installer/tasks/install_windows.yml

- name: "Windows | Cargar configuracion de paquetes"
  ansible.builtin.include_vars:
    file: software_packages_windows.yml
    name: win_config

- name: "Windows | Validar win_config base cargado"
  ansible.builtin.assert:
    that:
      - win_config is defined
      - win_config.windows_dest_path is defined
      - win_config.windows_files_to_copy is defined
    fail_msg: "No se cargo correctamente software_packages_windows.yml o faltan llaves requeridas (windows_dest_path/windows_files_to_copy)."

- name: "Windows | Inicializar lista de resultados para este host"
  ansible.builtin.set_fact:
    host_installation_results: []

# Definir ambiente desde el inicio (para rescue)
- name: "Windows | Determinar ambiente (pre)"
  ansible.builtin.set_fact:
    ambiente_detectado: "{{ 'PROD' if 'PROD' in group_names else 'DRP' if 'DRP' in group_names else 'DESCONOCIDO' }}"
    ya_instalado: false

# ------------------------------------------------------------
# Resolver valores efectivos desde Custom Credential Type
# ------------------------------------------------------------
- name: "Windows | Resolver variables de share"
  ansible.builtin.set_fact:
    _share_root: >-
      {{
        windows_share_root
        | default(win_config.windows_share_root | default(''))
      }}
    _relative_source_path: >-
      {{
        windows_software_source
        | default(win_config.windows_software_source | default(''))
      }}
    _share_user: >-
      {{
        windows_share_user
        | default(win_config.windows_share_user | default(''))
      }}
    _share_password: >-
      {{
        windows_share_password
        | default(win_config.windows_share_password | default(''))
      }}

# Construir la ruta completa combinando share_root y la ruta relativa
- name: "Windows | Construir ruta completa de origen"
  ansible.builtin.set_fact:
    _full_source_path: "{{ _share_root }}\\{{ _relative_source_path }}"

- name: "Windows | DEBUG - Mostrar valores de variables (temporal)"
  ansible.builtin.debug:
    msg:
      - "share_root: {{ _share_root }}"
      - "relative_source_path: {{ _relative_source_path }}"
      - "full_source_path: {{ _full_source_path }}"
      - "share_user: {{ _share_user }}"
  no_log: false

- name: "Windows | Validar variables requeridas para SMB"
  ansible.builtin.assert:
    that:
      - _share_root | length > 0
      - _relative_source_path | length > 0
      - _share_user | length > 0
      - _share_password | length > 0
    fail_msg: >-
      Faltan variables SMB. Asegurate de asociar la credencial Custom Credential Type al Job Template.
      Requeridas: windows_share_root, windows_software_source, windows_share_user, windows_share_password.

# ============================================
# Ejecucion controlada
# ============================================
- name: "Windows | Instalacion NCPA (controlado)"
  block:

    # ============================================
    # PASO 1: Autenticar + Validar + Copiar 
    # ============================================
    - name: "Windows | SMB: Autenticar + validar ruta + copiar archivos (single-session)"
      ansible.windows.win_shell: |
        $share     = "{{ _share_root }}"
        $user      = "{{ _share_user }}"
        $pass      = "{{ _share_password }}"
        $srcDir    = "{{ _full_source_path }}"
        $shareRoot = "{{ _share_root }}"
        $destDir   = "{{ win_config.windows_dest_path }}"

        Write-Output "== SMB SESSION START =="
        Write-Output "Share root: $shareRoot"
        Write-Output "Full source: $srcDir"
        Write-Output "Dest: $destDir"

        # Limpieza por si existia sesion previa
        cmd /c "net use $share /delete /y" 2>$null | Out-Null

        # Autenticacion
        cmd /c "net use $share /user:$user $pass /persistent:no" | Out-Null
        if ($LASTEXITCODE -ne 0) {
          Write-Output "ERROR: net use fallo (rc=$LASTEXITCODE) hacia $share"
          exit 10
        }

        # Validar share root
        if (!(Test-Path $shareRoot)) {
          Write-Output "ERROR: El share raiz NO es accesible: $shareRoot"
          cmd /c "net use $share /delete /y" | Out-Null
          exit 11
        } else {
          Write-Output "OK: El share raiz SI es accesible"
        }

        # Validar ruta completa
        Write-Output "Verificando ruta completa: $srcDir"
        if (!(Test-Path $srcDir)) {
          Write-Output "ERROR: Ruta de origen NO accesible: $srcDir"
          Write-Output "Contenido del share raiz (debug):"
          Get-ChildItem $shareRoot -ErrorAction SilentlyContinue | Select-Object Name | Format-Table -AutoSize
          cmd /c "net use $share /delete /y" | Out-Null
          exit 12
        } else {
          Write-Output "OK: Ruta de origen accesible: $srcDir"
        }

        # Crear destino si no existe
        if (!(Test-Path $destDir)) {
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
        }

        # Copia de archivos (loop templated por Jinja)
        $copied = @()
        {% for f in win_config.windows_files_to_copy %}
        $filePath = "{{ _full_source_path }}\{{ f }}"
        if (!(Test-Path $filePath)) {
          Write-Output "ERROR: No existe archivo en origen: $filePath"
          cmd /c "net use $share /delete /y" | Out-Null
          exit 13
        }

        Copy-Item -Path $filePath -Destination $destDir -Force
        $copied += "{{ f }}"
        {% endfor %}

        Write-Output ("OK: Archivos copiados: " + ($copied -join ", "))

        # Cerrar sesion SMB
        cmd /c "net use $share /delete /y" | Out-Null
        Write-Output "== SMB SESSION END =="
      register: smb_copy_session
      failed_when: smb_copy_session.rc != 0
      no_log: true

    # ============================================
    # PASO 2: Crea directorio destino
    # ============================================
    - name: "Windows | Crear directorio de destino"
      ansible.windows.win_file:
        path: "{{ win_config.windows_dest_path }}"
        state: directory

    # ============================================
    # PASO 3: Verificar que los archivos se copiaron (ajuste: corregir path)
    # ============================================
    - name: "Windows | Verificar que los archivos se copiaron"
      ansible.windows.win_stat:
        path: "{{ win_config.windows_dest_path }}\\{{ item }}"
      loop: "{{ win_config.windows_files_to_copy }}"
      register: verify_copy

    # ============================================
    # PASO 4: Determinar script segun grupo
    # ============================================
    - name: "Windows | Determinar script a ejecutar segun el grupo"
      ansible.builtin.set_fact:
        script_a_ejecutar: >-
          {% if 'PROD' in group_names %}
          {{ win_config.windows_dest_path }}Instalar_Nagios_KIO.BAT
          {% elif 'DRP' in group_names %}
          {{ win_config.windows_dest_path }}Instalar_Nagios_TRIARA.BAT
          {% else %}
          ""
          {% endif %}

    - name: "Windows | Mostrar informacion de ejecucion"
      ansible.builtin.debug:
        msg:
          - "Ambiente detectado: {{ ambiente_detectado }}"
          - "Script a ejecutar: {{ script_a_ejecutar }}"
          - "Ruta de trabajo: {{ win_config.windows_dest_path }}"
          - "Share root: {{ _share_root }}"
          - "Ruta relativa source: {{ _relative_source_path }}"
          - "Ruta completa source: {{ _full_source_path }}"

    # ============================================
    # PASO 4.5: Verificar si NCPA esta instalado
    # ============================================
    - name: "Windows | Verificar si NCPA ya esta instalado"
      ansible.windows.win_stat:
        path: "C:\\Program Files\\Nagios\\NCPA\\ncpa.exe"
      register: ncpa_pre_check

    - name: "Windows | Establecer flag de instalacion previa"
      ansible.builtin.set_fact:
        ya_instalado: "{{ ncpa_pre_check.stat.exists | default(false) }}"

    - name: "Windows | Mostrar estado de instalacion previa"
      ansible.builtin.debug:
        msg: "NCPA ya esta instalado previamente - se omitira la instalacion"
      when: ya_instalado

    # ============================================
    # PASO 4.6: EJECUTAR SCRIPT SOLO SI NO ESTA INSTALADO
    # ============================================
    - name: "Windows | Ejecutar script de instalacion"
      ansible.windows.win_command: "{{ script_a_ejecutar }}"
      args:
        chdir: "{{ win_config.windows_dest_path }}"
      register: script_execution
      failed_when: false
      changed_when: script_execution.rc == 0
      when:
        - script_a_ejecutar != ""
        - not ya_instalado
      become: true
      become_method: runas
      become_user: SYSTEM

    - name: "Windows | Registrar resultado para cuando ya estaba instalado"
      ansible.builtin.set_fact:
        script_execution:
          rc: 0
          stdout: "NCPA ya estaba instalado previamente - script no ejecutado"
          stderr: ""
      when: ya_instalado

    - name: "Windows | Mostrar resultado de la ejecucion"
      ansible.builtin.debug:
        msg:
          - "Codigo de salida: {{ script_execution.rc | default('N/A') }}"
          - "Output: {{ script_execution.stdout | default('') }}"
          - "Error: {{ script_execution.stderr | default('') }}"
      when: script_execution is defined

    # ============================================
    # PASO 5: Verificar instalacion
    # ============================================
    - name: "Windows | Verificar si NCPA esta instalado (post-instalacion)"
      ansible.windows.win_stat:
        path: "C:\\Program Files\\Nagios\\NCPA\\ncpa.exe"
      register: ncpa_installed

    - name: "Windows | Obtener version de NCPA"
      ansible.windows.win_shell: |
        if (Test-Path "C:\Program Files\Nagios\NCPA\ncpa.exe") {
            (Get-Item "C:\Program Files\Nagios\NCPA\ncpa.exe").VersionInfo.ProductVersion
        } else {
            Write-Output "No instalado"
        }
      register: ncpa_version
      when: ncpa_installed.stat.exists

    - name: "Windows | Verificar estado del servicio NCPA"
      ansible.windows.win_shell: |
        $service = Get-Service -Name ncpasvc -ErrorAction SilentlyContinue
        if ($service) {
            $service.Status.ToString()
        } else {
            Write-Output "Servicio no encontrado"
        }
      register: service_status

    - name: "Windows | Verificar puerto 5693"
      ansible.windows.win_shell: |
        $portTest = Test-NetConnection -ComputerName localhost -Port 5693 -WarningAction SilentlyContinue
        if ($portTest.TcpTestSucceeded) {
            Write-Output "Abierto"
        } else {
            Write-Output "Cerrado"
        }
      register: port_check
      when: (service_status.stdout | default('')) == "Running"

    - name: "Windows | Mostrar diagnostico de instalacion"
      ansible.builtin.debug:
        msg:
          - "DIAGNOSTICO DE INSTALACION:"
          - "NCPA instalado: {{ 'Si' if (ncpa_installed.stat.exists | default(false)) else 'No' }}"
          - "Version: {{ ncpa_version.stdout | default('N/A') }}"
          - "Estado servicio: {{ service_status.stdout | default('N/A') }}"

    # ============================================
    # PASO 6: Limpieza
    # ============================================
    - name: "Windows | Eliminar archivos copiados del directorio temporal"
      ansible.windows.win_file:
        path: "{{ win_config.windows_dest_path }}\\{{ item }}"
        state: absent
      loop: "{{ win_config.windows_files_to_copy }}"
      register: cleanup_result
      failed_when: false

    # Opcional: cerrar sesion SMB al final (ya se cierra en el PASO 1, lo dejo por seguridad)
    - name: "Windows | Cerrar sesion SMB (net use delete)"
      ansible.windows.win_shell: |
        cmd /c "net use {{ _share_root }} /delete /y"
      changed_when: false
      failed_when: false
      no_log: true

    # ============================================
    # PASO 7: Consolidar resultados (sin cambios)
    # ============================================
    - name: "Windows | Determinar mensaje para el reporte"
      ansible.builtin.set_fact:
        mensaje_base: >-
          {% if ya_instalado %}
          Paquete instalado previamente
          {% else %}
          Paquete instalado correctamente
          {% endif %}

    - name: "Windows | Construir resultado de instalacion"
      ansible.builtin.set_fact:
        host_installation_results: "{{ host_installation_results + [ pkg_result ] }}"
      vars:
        pkg_result:
          package_name: "NCPA Agent"
          ambiente: "{{ ambiente_detectado }}"
          script_ejecutado: "{{ script_a_ejecutar | basename if not ya_instalado else 'N/A' }}"
          status: "{{ 'success' if ((script_execution.rc | default(1)) == 0 or ya_instalado) and (ncpa_installed.stat.exists | default(false)) else 'failed' }}"
          install_date: "{{ ansible_date_time.iso8601 }}"
          ya_instalado: "{{ ya_instalado | default(false) }}"
          version_installed: "{{ ncpa_version.stdout | default('N/A') | trim }}"
          service_status: "{{ service_status.stdout | default('No instalado') | trim }}"
          port_status: "{{ port_check.stdout | default('N/A') }}"
          instalado: "{{ 'Si' if (ncpa_installed.stat.exists | default(false)) else 'No' }}"
          install_path: "C:\\Program Files\\Nagios\\NCPA"
          cleanup_performed: "{{ 'Si' if cleanup_result is defined else 'No' }}"
          files_cleaned: "{{ win_config.windows_files_to_copy | join(', ') }}"
          rc: "{{ script_execution.rc | default('') }}"
          script_output: "{{ script_execution.stdout | default('') }}"
          script_error: "{{ script_execution.stderr | default('') }}"
          files_copied: "{{ win_config.windows_files_to_copy | join(', ') }}"
          message: "{{ mensaje_base }} | Archivos temporales eliminados."

    - name: "Windows | Determinar estado general del host"
      ansible.builtin.set_fact:
        overall_host_status: >-
          {% set failed_states = host_installation_results | selectattr('status', 'equalto', 'failed') | list %}
          {% if failed_states | length > 0 %}failed
          {% else %}success
          {% endif %}

    - name: "Windows | Construir resultado final para el host"
      ansible.builtin.set_fact:
        software_installation_result:
          host: "{{ inventory_hostname }}"
          os_family: "Windows"
          overall_status: "{{ overall_host_status }}"
          ambiente: "{{ ambiente_detectado }}"
          packages: "{{ host_installation_results }}"
          message: "{{ mensaje_base }} | Archivos temporales eliminados."

  rescue:
    # Construir mensaje amigable: prioriza stdout del task único
    - name: "Windows | Capturar error para reporte (priorizar mensaje amigable)"
      ansible.builtin.set_fact:
        _win_error_msg: >-
          {{
            (
              smb_copy_session.stdout
              if (smb_copy_session is defined and (smb_copy_session.stdout | default('') | length > 0))
              else
              (
                ansible_failed_result.stdout
                | default(ansible_failed_result.stderr | default(''))
                | default(ansible_failed_result.msg | default('Falla durante instalacion NCPA (detalle no disponible)'))
              )
            )
            | trim
          }}

    - name: "Windows | Construir resultado FAILED para el host (para reportes)"
      ansible.builtin.set_fact:
        software_installation_result:
          host: "{{ inventory_hostname }}"
          os_family: "Windows"
          overall_status: "failed"
          ambiente: "{{ ambiente_detectado | default('DESCONOCIDO') }}"
          packages:
            - package_name: "NCPA Agent"
              ambiente: "{{ ambiente_detectado | default('DESCONOCIDO') }}"
              script_ejecutado: "N/A"
              status: "failed"
              install_date: "{{ ansible_date_time.iso8601 }}"
              ya_instalado: "{{ ya_instalado | default(false) }}"
              version_installed: "N/A"
              install_path: "N/A"
              message: "Falla durante instalacion: {{ _win_error_msg }}"
          message: "Falla durante instalacion: {{ _win_error_msg }}"