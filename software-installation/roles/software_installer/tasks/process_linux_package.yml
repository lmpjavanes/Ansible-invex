---
# roles/software_installer/tasks/process_linux_package.yml

- name: "Linux | Inicializar variables por paquete"
  ansible.builtin.set_fact:
    install_result:
      rc: "N/A"
      stdout: ""
      stderr: ""
    validation_result:
      rc: "N/A"
      stdout: ""
      stderr: ""
    _report_dir_effective: "{{ report_dir | default('/tmp') }}"

- name: "Linux | Procesando {{ pkg.name | default('paquete_sin_nombre') }}"
  vars:
    _pkg_name: "{{ pkg.name | default('') }}"
    _pkg_file: "{{ pkg.src_file | default('') }}"
    _pkg_desc: "{{ pkg.description | default('') }}"
    _pkg_vendor: "{{ pkg.vendor | default('') }}"
    _dest_path: "{{ pkg.dest_path | default('/tmp/') }}"
    source_full_path: "/software_repo/{{ _pkg_file }}"
    dest_full_path: "{{ _dest_path }}{{ _pkg_file }}"
    controller_temp_path: "/tmp/ansible_temp_{{ _pkg_file }}"

    _cmd_install_base: "{{ (pkg.commands.install | default('rpm -ivh')) | trim }}"
    _cmd_post_validate: "{{ (pkg.commands.post_install_validation | default('')) | trim }}"
    _cmd_activation: "{{ (pkg.commands.activation | default('')) | trim }}"
    _cmd_start: "{{ (pkg.commands.start | default('')) | trim }}"
    _cmd_status: "{{ (pkg.commands.status | default('')) | trim }}"

    _version_regex: "{{ pkg.version_regex | default('') }}"
  block:

    # ===========================
    # 0) Validaciones
    # ===========================
    - name: "Linux | Validar definicion del paquete"
      ansible.builtin.assert:
        that:
          - _pkg_name | length > 0
          - _pkg_file | length > 0
          - _cmd_post_validate | length > 0
        fail_msg: >-
          Definicion incompleta del paquete. Se requiere: name, src_file,
          y commands.post_install_validation. Paquete recibido: {{ pkg | to_nice_json }}

    # ===========================
    # 1) Pre-validación: ¿ya esta instalado? (ANTES de copiar RPM)
    # ===========================
    - name: "Linux | Pre-validacion usando post_install_validation"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_post_validate }}
      args:
        executable: /bin/bash
      register: pre_validation
      changed_when: false
      failed_when: false

    - name: "Linux | Determinar si el paquete ya esta instalado"
      ansible.builtin.set_fact:
        package_installed: "{{ (pre_validation.rc | default(1)) == 0 }}"

    # ===========================
    # 2) Repo/FETCH/COPY/INSTALL (solo si NO esta instalado)
    # ===========================
    - name: "Linux | Repo/FETCH/COPY/INSTALL (solo si no esta instalado)"
      block:

        # 2.1) Verificar en origen (invd-ts-ansible)
        - name: "Linux | Verificar que el archivo existe en invd-ts-ansible"
          ansible.builtin.stat:
            path: "{{ source_full_path }}"
          delegate_to: invd-ts-ansible
          register: file_check
          run_once: true

        - name: "Linux | Detener si el archivo no existe"
          ansible.builtin.fail:
            msg: "El archivo {{ source_full_path }} no existe en invd-ts-ansible"
          when: not file_check.stat.exists

        # 2.2) Fetch al controller
        - name: "Linux | FETCH - Traer archivo desde invd-ts-ansible al nodo controlador"
          ansible.builtin.fetch:
            src: "{{ source_full_path }}"
            dest: "{{ controller_temp_path }}"
            flat: true
          delegate_to: invd-ts-ansible
          register: fetch_result
          run_once: true

        - name: "Linux | Verificar que el fetch fue exitoso (controller)"
          ansible.builtin.stat:
            path: "{{ controller_temp_path }}"
          delegate_to: localhost
          register: fetch_check
          run_once: true

        - name: "Linux | Detener si el archivo no se copio al controlador"
          ansible.builtin.fail:
            msg: "El archivo {{ controller_temp_path }} no existe en el nodo controlador"
          when: not fetch_check.stat.exists

        # 2.3) Copiar al host destino
        - name: "Linux | Copiar archivo desde nodo controlador al servidor destino"
          ansible.builtin.copy:
            src: "{{ controller_temp_path }}"
            dest: "{{ dest_full_path }}"
            mode: "0644"
          register: copy_result

        - name: "Linux | Verificar que el archivo se copio al destino"
          ansible.builtin.stat:
            path: "{{ dest_full_path }}"
          register: copy_check

        - name: "Linux | Detener si el archivo no se copio al destino"
          ansible.builtin.fail:
            msg: "El archivo {{ dest_full_path }} no existe en el host destino"
          when: not copy_check.stat.exists

        # 2.4) Instalacion (solo si NO estaba instalado)
        - name: "Linux | Instalar paquete"
          ansible.builtin.shell: |
            set -o pipefail
            {{ _cmd_install_base }} "{{ dest_full_path }}"
          args:
            executable: /bin/bash
          register: install_result
          failed_when: false

      when: not package_installed

    # ===========================
    # 6) Post-validacion
    # ===========================
    - name: "Linux | Post-validacion usando post_install_validation"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_post_validate }}
      args:
        executable: /bin/bash
      register: post_validation
      changed_when: false
      failed_when: false

    - name: "Linux | Construir validation_result"
      ansible.builtin.set_fact:
        validation_result:
          rc: "{{ post_validation.rc | default(1) }}"
          stdout: "{{ post_validation.stdout | default('') }}"
          stderr: "{{ post_validation.stderr | default('') }}"

    - name: "Linux | Determinar si el paquete quedo instalado despues"
      ansible.builtin.set_fact:
        package_installed_after: "{{ (post_validation.rc | default(1)) == 0 }}"

    # ===========================
    # 6.1) Obtener version (robusto, no falla si no hay match)
    # ===========================
    - name: "Linux | Calcular version instalada (robusto con regex_findall)"
      ansible.builtin.set_fact:
        _version_matches: >-
          {{
            (validation_result.stdout | default('') | regex_findall(_version_regex))
            if (_version_regex | default('') | length > 0) else []
          }}

    - name: "Linux | Set version_installed (primer match o vacio)"
      ansible.builtin.set_fact:
        version_installed: "{{ (_version_matches | first) | default('') }}"

    # ===========================
    # 6.2) Obtener fecha de instalacion (best-effort)
    # ===========================
    - name: "Linux | Obtener fecha de instalacion (rpm -qi) (best-effort)"
      ansible.builtin.shell: |
        set -o pipefail
        rpm -qi "{{ _pkg_name }}" | awk -F': ' '/Install Date/ {print $2; exit 0}'
      args:
        executable: /bin/bash
      register: install_date_cmd
      changed_when: false
      failed_when: false
      when: package_installed_after | bool

    - name: "Linux | Set install_date (best-effort)"
      ansible.builtin.set_fact:
        install_date: "{{ (install_date_cmd.stdout | default('')) | trim }}"
      when: package_installed_after | bool

    - name: "Linux | Set install_date default"
      ansible.builtin.set_fact:
        install_date: ""
      when: install_date is not defined

    # ===========================
    # 7) Activation / Start / Status
    #    - Con timeouts para evitar cuelgues
    #    - Para SentinelAgent: start → check → activate-if-needed → status
    # ===========================
    - name: "Linux | Iniciar servicio/agente (con timeout)"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_start }} < /dev/null
      args:
        executable: /bin/bash
        timeout: "{{ pkg.start_timeout_sec | default(180) }}"
      register: start_result
      when:
        - package_installed_after | bool
        - _cmd_start | length > 0
      changed_when: false
      failed_when: false

    - name: "Linux | SentinelAgent | Check activacion (best-effort, con timeout)"
      ansible.builtin.shell: |
        set -o pipefail
        {{ (pkg.activation_check.cmd | default(_cmd_status)) }} < /dev/null
      args:
        executable: /bin/bash
        timeout: "{{ pkg.status_timeout_sec | default(60) }}"
      register: sentinel_activation_check
      changed_when: false
      failed_when: false
      when:
        - pkg.name | default('') == 'SentinelAgent'
        - package_installed_after | bool
        - ((pkg.activation_check is defined) or (_cmd_status | length > 0))

    - name: "Linux | SentinelAgent | Determinar si ya esta activado"
      ansible.builtin.set_fact:
        sentinel_is_activated: >-
          {{
            (sentinel_activation_check.stdout | default(''))
            is regex( (pkg.activation_check.success_regex | default('Agent state\\s+Enabled')) )
          }}
      when:
        - pkg.name | default('') == 'SentinelAgent'
        - package_installed_after | bool

    - name: "Linux | SentinelAgent | Validar token si se requiere activacion"
      ansible.builtin.assert:
        that:
          - sentinelone_token is defined
          - (sentinelone_token | string | length) > 20
        fail_msg: "sentinelone_token no esta definido o es invalido. Se omite activacion."
      when:
        - pkg.name | default('') == 'SentinelAgent'
        - package_installed_after | bool
        - _cmd_activation | length > 0
        - (sentinel_is_activated | default(false)) == false
        - ((not package_installed) | bool) or (pkg.force_activation | default(false) | bool)
      failed_when: false

    - name: "Linux | SentinelAgent | Ejecutar activacion (si hace falta, con timeout)"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_activation }} < /dev/null
      args:
        executable: /bin/bash
        timeout: "{{ pkg.activation_timeout_sec | default(180) }}"
      register: activation_result
      when:
        - pkg.name | default('') == 'SentinelAgent'
        - package_installed_after | bool
        - _cmd_activation | length > 0
        - (sentinel_is_activated | default(false)) == false
        - ((not package_installed) | bool) or (pkg.force_activation | default(false) | bool)
      changed_when: false
      failed_when: false

    - name: "Linux | SentinelAgent | Verificar status final (con timeout)"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_status }} < /dev/null
      args:
        executable: /bin/bash
        timeout: "{{ pkg.status_timeout_sec | default(60) }}"
      register: status_result
      when:
        - pkg.name | default('') == 'SentinelAgent'
        - package_installed_after | bool
        - _cmd_status | length > 0
      changed_when: false
      failed_when: false

    - name: "Linux | Ejecutar activacion (otros paquetes, con timeout)"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_activation }} < /dev/null
      args:
        executable: /bin/bash
        timeout: "{{ pkg.activation_timeout_sec | default(180) }}"
      register: activation_result
      when:
        - (pkg.name | default('')) != 'SentinelAgent'
        - package_installed_after | bool
        - _cmd_activation | length > 0
        - ((not package_installed) | bool) or (pkg.force_activation | default(false) | bool)
      changed_when: false
      failed_when: false

    - name: "Linux | Verificar status (otros paquetes, con timeout)"
      ansible.builtin.shell: |
        set -o pipefail
        {{ _cmd_status }} < /dev/null
      args:
        executable: /bin/bash
        timeout: "{{ pkg.status_timeout_sec | default(60) }}"
      register: status_result
      when:
        - (pkg.name | default('')) != 'SentinelAgent'
        - package_installed_after | bool
        - _cmd_status | length > 0
      changed_when: false
      failed_when: false

    # ===========================
    # 8) Construir resultado del paquete y agregar a host_installation_results
    # ===========================
    - name: "Linux | Construir status final del paquete"
      ansible.builtin.set_fact:
        _pkg_status: "{{ 'success' if (package_installed_after | bool) else 'failed' }}"

    - name: "Linux | Construir mensaje de paquete (para reportes)"
      ansible.builtin.set_fact:
        _pkg_message: >-
          {% if package_installed | bool %}
          Paquete instalado previamente
          {% elif package_installed_after | bool %}
          Paquete instalado correctamente
          {% else %}
          Fallo instalacion/validacion
          {% endif %}

    - name: "Linux | Agregar resultado del paquete a host_installation_results"
      ansible.builtin.set_fact:
        host_installation_results: >-
          {{
            (host_installation_results | default([])) + [
              {
                'package_name': _pkg_name,
                'description': _pkg_desc,
                'vendor': _pkg_vendor,
                'status': _pkg_status,
                'ya_instalado': (package_installed | default(false)),
                'install_date': (install_date | default('')),
                'version_installed': (version_installed | default('')),
                'message': _pkg_message
              }
            ]
          }}

    # ===========================
    # 9) Limpieza (opcional)
    # ===========================
    - name: "Linux | Eliminar archivo copiado en destino (opcional)"
      ansible.builtin.file:
        path: "{{ dest_full_path }}"
        state: absent
      when: (pkg.cleanup_dest | default(false)) | bool

    - name: "Linux | Eliminar archivo temporal en controlador"
      ansible.builtin.file:
        path: "{{ controller_temp_path }}"
        state: absent
      delegate_to: localhost
      run_once: true

    # ===========================
    # 10) Log por host
    # ===========================
    - name: "Linux | Guardar verificacion en archivo de log"
      ansible.builtin.copy:
        dest: "{{ _report_dir_effective }}/linux_software_install_{{ inventory_hostname }}.log"
        content: |
          ============================================
          Host: {{ inventory_hostname }}
          Paquete: {{ _pkg_name }}
          Archivo: {{ _pkg_file }}
          Fecha: {{ ansible_date_time.iso8601 }}
          --------------------------------------------
          post_install_validation: {{ _cmd_post_validate }}
          Instalado (antes): {{ package_installed | default('N/A') }}
          RC pre-validación: {{ pre_validation.rc | default('N/A') }}
          OUT pre-validación: {{ pre_validation.stdout | default('') }}
          ERR pre-validación: {{ pre_validation.stderr | default('') }}
          --------------------------------------------
          Instalación ejecutada: {{ (not package_installed) | default(false) }}
          Código instalación: {{ install_result.rc | default('N/A') }}
          OUT instalación: {{ install_result.stdout | default('') }}
          ERR instalación: {{ install_result.stderr | default('') }}
          --------------------------------------------
          Instalado (después): {{ package_installed_after | default('N/A') }}
          RC post-validación: {{ validation_result.rc | default('N/A') }}
          OUT post-validación: {{ validation_result.stdout | default('') }}
          ERR post-validación: {{ validation_result.stderr | default('') }}
          --------------------------------------------
          Versión instalada: {{ version_installed | default('') }}
          Fecha instalación: {{ install_date | default('') }}
          ============================================

  rescue:
    - name: "Linux | Error al procesar {{ pkg.name | default('paquete_sin_nombre') }}"
      ansible.builtin.debug:
        msg:
          - "Ocurrio un error al procesar el paquete {{ pkg.name | default('N/A') }}"
          - "Error: {{ ansible_failed_result | default({}) }}"

    - name: "Linux | Agregar resultado fallido del paquete a host_installation_results (para reporte)"
      ansible.builtin.set_fact:
        host_installation_results: >-
          {{
            (host_installation_results | default([])) + [
              {
                'package_name': (pkg.name | default('N/A')),
                'description': (pkg.description | default('')),
                'vendor': (pkg.vendor | default('')),
                'status': 'failed',
                'ya_instalado': false,
                'install_date': '',
                'version_installed': '',
                'message': 'Fallo instalacion/validacion'
              }
            ]
          }}

    - name: "Linux | Guardar error en log (fallback seguro)"
      ansible.builtin.copy:
        dest: "{{ _report_dir_effective }}/linux_software_install_{{ inventory_hostname }}.log"
        content: |
          ============================================
          Host: {{ inventory_hostname }}
          Paquete: {{ pkg.name | default('N/A') }}
          Archivo: {{ pkg.src_file | default('N/A') }}
          Fecha: {{ ansible_date_time.iso8601 }}
          --------------------------------------------
          ERROR durante el procesamiento del paquete.
          Detalle:
          {{ ansible_failed_result | default({}) }}
          ============================================

  always:
    - name: "Linux | Fin del procesamiento de {{ pkg.name | default('paquete_sin_nombre') }}"
      ansible.builtin.debug:
        msg: "Finalizo procesamiento de {{ pkg.name | default('N/A') }} en {{ inventory_hostname }}"