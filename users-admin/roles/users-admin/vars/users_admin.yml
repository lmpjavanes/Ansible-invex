---
# ==============================
# Configuración del rol users-admin
# (Debe vivir dentro de roles/users-admin/vars para AAP)
# ==============================

# Operación global:
#   - create: crea/actualiza usuarios
#   - delete: elimina usuarios (NO elimina home directory)
operation: create

# Base default para HOME cuando no se define 'home'
home_base: "/home"

# Tipos soportados:
#   - os  : usuario de sistema (shell interactivo)
#   - ftp : usuario FTP (shell no interactivo)
#
# Campos por usuario:
#   username  (requerido)
#   group     (requerido en create; opcional en delete)
#   type      (os|ftp) (opcional; default os)
#   home      (opcional; default: {{home_base}}/{{username}})
#   comment   (opcional)
#   shell     (opcional; si se define, tiene prioridad)
users:
  - username: "example_user"
    group: "example_group"
    type: "os"
    # home: "/home/example_user"
    comment: "Usuario de ejemplo"

# Opcional: rutas comunes de shell para usuario FTP (según distro)
ftp_shell_candidates:
  - "/sbin/nologin"
  - "/usr/sbin/nologin"
  - "/bin/false"

# Si deseas forzar que el home exista (create) aunque el usuario ya exista.
# Ansible user module crea el home con create_home: true cuando aplica.
create_home: true

# Si quieres permitir que el rol continúe aunque una operación por usuario falle.
continue_on_user_error: true
