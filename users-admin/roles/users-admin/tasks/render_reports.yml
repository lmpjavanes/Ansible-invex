---
- name: Validar que report_dir este definido
  ansible.builtin.assert:
    that:
      - report_dir is defined
      - (report_dir | string | length) > 0
    fail_msg: "La variable 'report_dir' no esta definida. Definela en el play de control antes de renderizar."

- name: Crear directorio del reporte en invd-ts-ansible (si no existe)
  ansible.builtin.file:
    path: "{{ report_dir }}"
    state: directory
    mode: "0755"
  delegate_to: invd-ts-ansible
  run_once: true

- name: Asegurar variables (evitar undefined)
  ansible.builtin.set_fact:
    audit_linux: "{{ audit_linux | default([]) }}"
  run_once: true

# -------------------------
# Reportes base
# -------------------------
- name: Reporte CSV (Users Admin Linux)
  ansible.builtin.template:
    src: linux_users_admin.csv.j2
    dest: "{{ report_dir }}/linux_users_admin.csv"
    mode: "0644"
  delegate_to: invd-ts-ansible
  run_once: true

- name: Reporte HTML (Users Admin Linux)
  ansible.builtin.template:
    src: linux_users_admin.html.j2
    dest: "{{ report_dir }}/linux_users_admin.html"
    mode: "0644"
  delegate_to: invd-ts-ansible
  run_once: true

# -------------------------
# Passwords: TXT temporal + cifrado a .vault con env var de AAP
# -------------------------
- name: Obtener vault password desde env var (AAP Custom Credential)
  ansible.builtin.set_fact:
    _users_admin_vault_pass: "{{ lookup('ansible.builtin.env', 'USERS_ADMIN_VAULT_PASS') | default('', true) }}"
  run_once: true
  no_log: true

- name: Validar que USERS_ADMIN_VAULT_PASS venga definido desde AAP
  ansible.builtin.assert:
    that:
      - (_users_admin_vault_pass | length) > 0
    fail_msg: >-
      No se detecto la env var USERS_ADMIN_VAULT_PASS.
      Verifica que el Job Template tenga asociado el Credential (custom) que inyecta USERS_ADMIN_VAULT_PASS.
  run_once: true
  no_log: true

# --------------------------------------------------------------------
# Manejo defensivo de ansible-vault
# --------------------------------------------------------------------
- name: Verificar si ansible-vault existe en invd-ts-ansible
  ansible.builtin.command: "command -v ansible-vault"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_check
  changed_when: false
  failed_when: false

- name: Instalar ansible-vault con pip (invd-ts-ansible) si falta
  ansible.builtin.pip:
    name: ansible
    state: present
    extra_args: "--no-cache-dir"
  delegate_to: invd-ts-ansible
  run_once: true
  when: _vault_check.rc != 0
  register: _vault_install
  failed_when: false

- name: Fallar si ansible-vault no pudo instalarse
  ansible.builtin.fail:
    msg: "No se pudo instalar ansible-vault en invd-ts-ansible. Verifica la conectividad a internet o la instalacion manual."
  when:
    - _vault_check.rc != 0
    - (_vault_install is not defined) or (_vault_install.failed | default(false))

# --------------------------------------------------------------------
# DEBUG: Verificar version de ansible-vault
# --------------------------------------------------------------------
- name: DEBUG - Verificar version de ansible-vault
  ansible.builtin.command: "ansible-vault --version"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_version
  changed_when: false

- name: DEBUG - Mostrar version de ansible-vault
  ansible.builtin.debug:
    msg: "ansible-vault version: {{ _vault_version.stdout }}"
  run_once: true

# --------------------------------------------------------------------
# Generacion y cifrado de passwords - VERSION DEBUG
# --------------------------------------------------------------------
- name: Verificar/Crear archivo de passwords limpio
  ansible.builtin.file:
    path: "{{ report_dir }}/linux_users_passwords.txt.vault"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true

- name: Generar TXT de passwords (temporal, en claro)
  ansible.builtin.template:
    src: linux_users_passwords.txt.j2
    dest: "{{ report_dir }}/linux_users_passwords.txt"
    mode: "0600"
  delegate_to: invd-ts-ansible
  run_once: true

- name: DEBUG - Verificar contenido del archivo de passwords
  ansible.builtin.shell: |
    echo "=== Contenido del archivo de passwords ==="
    cat "{{ report_dir }}/linux_users_passwords.txt"
    echo "=== Fin del archivo ==="
    echo "=== Permisos del archivo ==="
    ls -la "{{ report_dir }}/linux_users_passwords.txt"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _file_check
  changed_when: false

- name: DEBUG - Mostrar informacion del archivo
  ansible.builtin.debug:
    msg: "{{ _file_check.stdout }}"
  run_once: true

- name: Crear vault password file temporal (solo runtime)
  ansible.builtin.copy:
    dest: "{{ report_dir }}/.users_admin_vault_pass.tmp"
    content: "{{ _users_admin_vault_pass }}"
    mode: "0600"
  delegate_to: invd-ts-ansible
  run_once: true
  no_log: true

- name: DEBUG - Verificar que el password file se creo correctamente
  ansible.builtin.shell: |
    echo "=== Password file existe y tiene permisos ==="
    ls -la "{{ report_dir }}/.users_admin_vault_pass.tmp"
    echo "=== Longitud del password (caracteres) ==="
    wc -c "{{ report_dir }}/.users_admin_vault_pass.tmp"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _passfile_check
  changed_when: false
  no_log: false

- name: DEBUG - Mostrar informacion del password file
  ansible.builtin.debug:
    msg: "{{ _passfile_check.stdout }}"
  run_once: true

- name: Cifrar TXT a .vault (output junto a reportes) - VERSION DEBUG
  ansible.builtin.shell: |
    set -x  # Mostrar comandos ejecutados
    echo "=== Intentando cifrar el archivo ==="
    
    # Verificar si el archivo ya está cifrado
    if head -1 "{{ report_dir }}/linux_users_passwords.txt" 2>/dev/null | grep -q "^$ANSIBLE_VAULT;"; then
      echo "ERROR: El archivo ya esta cifrado" >&2
      exit 1
    fi
    
    # Mostrar el comando que vamos a ejecutar
    echo "Comando: ansible-vault encrypt {{ report_dir }}/linux_users_passwords.txt --output {{ report_dir }}/linux_users_passwords.txt.vault --vault-password-file {{ report_dir }}/.users_admin_vault_pass.tmp"
    
    # Ejecutar el comando
    ansible-vault encrypt \
      "{{ report_dir }}/linux_users_passwords.txt" \
      --output "{{ report_dir }}/linux_users_passwords.txt.vault" \
      --vault-password-file "{{ report_dir }}/.users_admin_vault_pass.tmp" 2>&1
    
    # Verificar el resultado
    if [ $? -eq 0 ]; then
      echo "=== Cifrado exitoso ==="
      ls -la "{{ report_dir }}/linux_users_passwords.txt.vault"
    else
      echo "=== ERROR en el cifrado ==="
      exit 1
    fi
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_encrypt
  failed_when: false
  no_log: false  # IMPORTANTE: Desactivamos no_log para ver el error

- name: DEBUG - Mostrar resultado del cifrado
  ansible.builtin.debug:
    msg:
      - "RC: {{ _vault_encrypt.rc }}"
      - "STDOUT: {{ _vault_encrypt.stdout }}"
      - "STDERR: {{ _vault_encrypt.stderr }}"
  run_once: true
  when: _vault_encrypt.rc != 0

- name: Verificar que el archivo vault se creo correctamente
  ansible.builtin.stat:
    path: "{{ report_dir }}/linux_users_passwords.txt.vault"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_file

- name: DEBUG - Mostrar resultado de la verificacion
  ansible.builtin.debug:
    msg:
      - "Archivo vault existe: {{ _vault_file.stat.exists }}"
      - "Tamaño: {{ _vault_file.stat.size }} bytes"
      - "Permisos: {{ _vault_file.stat.mode }}"
  run_once: true

- name: Fallback - Intentar cifrado con metodo alternativo si el archivo vault no existe
  ansible.builtin.shell: |
    set -x
    echo "=== Intentando metodo alternativo (sin --output) ==="
    
    # Hacer backup del archivo original
    cp "{{ report_dir }}/linux_users_passwords.txt" "{{ report_dir }}/linux_users_passwords.txt.bak"
    
    # Ejecutar cifrado sin --output
    ansible-vault encrypt \
      "{{ report_dir }}/linux_users_passwords.txt" \
      --vault-password-file "{{ report_dir }}/.users_admin_vault_pass.tmp" 2>&1
    
    if [ $? -eq 0 ]; then
      echo "=== Cifrado alternativo exitoso ==="
      # Mover el archivo cifrado
      mv "{{ report_dir }}/linux_users_passwords.txt" "{{ report_dir }}/linux_users_passwords.txt.vault"
      # Restaurar el backup como archivo en claro temporal
      mv "{{ report_dir }}/linux_users_passwords.txt.bak" "{{ report_dir }}/linux_users_passwords.txt"
    else
      echo "=== ERROR en cifrado alternativo ==="
      # Restaurar backup en caso de error
      mv "{{ report_dir }}/linux_users_passwords.txt.bak" "{{ report_dir }}/linux_users_passwords.txt" 2>/dev/null || true
      exit 1
    fi
  delegate_to: invd-ts-ansible
  run_once: true
  when: not _vault_file.stat.exists
  register: _vault_encrypt_fallback
  failed_when: false
  no_log: false

- name: DEBUG - Mostrar resultado del fallback
  ansible.builtin.debug:
    msg:
      - "Fallback RC: {{ _vault_encrypt_fallback.rc }}"
      - "Fallback STDOUT: {{ _vault_encrypt_fallback.stdout }}"
      - "Fallback STDERR: {{ _vault_encrypt_fallback.stderr }}"
  run_once: true
  when: 
    - _vault_encrypt_fallback is defined
    - _vault_encrypt_fallback.rc != 0

- name: Verificar resultado final
  ansible.builtin.stat:
    path: "{{ report_dir }}/linux_users_passwords.txt.vault"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_final

- name: Fallar si no se pudo crear el archivo vault
  ansible.builtin.fail:
    msg: "No se pudo crear el archivo vault de passwords. Revise los mensajes de debug anteriores."
  when: not _vault_final.stat.exists

- name: Borrar TXT en claro (si existe)
  ansible.builtin.file:
    path: "{{ report_dir }}/linux_users_passwords.txt"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true

- name: Borrar vault password file temporal
  ansible.builtin.file:
    path: "{{ report_dir }}/.users_admin_vault_pass.tmp"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true
  no_log: true

- name: Borrar archivos temporales de debug
  ansible.builtin.file:
    path: "{{ report_dir }}/linux_users_passwords.txt.bak"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true
  ignore_errors: true

- name: Mostrar rutas de salida
  ansible.builtin.debug:
    msg:
      - "Reportes generados en: {{ report_dir }}"
      - "Linux CSV : {{ report_dir }}/linux_users_admin.csv"
      - "Linux HTML: {{ report_dir }}/linux_users_admin.html"
      - "Passwords (Vault): {{ report_dir }}/linux_users_passwords.txt.vault"
      - "Tamaño del archivo vault: {{ _vault_final.stat.size if _vault_final.stat.exists else 'N/A' }} bytes"
  run_once: true