---
- name: Validar que report_dir este definido
  ansible.builtin.assert:
    that:
      - report_dir is defined
      - (report_dir | string | length) > 0
    fail_msg: "La variable 'report_dir' no esta definida. Definela en el play de control antes de renderizar."

- name: Crear directorio del reporte en invd-ts-ansible (si no existe)
  ansible.builtin.file:
    path: "{{ report_dir }}"
    state: directory
    mode: "0755"
  delegate_to: invd-ts-ansible
  run_once: true

- name: Asegurar variables (evitar undefined)
  ansible.builtin.set_fact:
    audit_linux: "{{ audit_linux | default([]) }}"
  run_once: true

# -------------------------
# Reportes base
# -------------------------
- name: Reporte CSV (Users Admin Linux)
  ansible.builtin.template:
    src: linux_users_admin.csv.j2
    dest: "{{ report_dir }}/linux_users_admin.csv"
    mode: "0644"
  delegate_to: invd-ts-ansible
  run_once: true

- name: Reporte HTML (Users Admin Linux)
  ansible.builtin.template:
    src: linux_users_admin.html.j2
    dest: "{{ report_dir }}/linux_users_admin.html"
    mode: "0644"
  delegate_to: invd-ts-ansible
  run_once: true

# -------------------------
# Passwords: TXT temporal + cifrado a .vault con env var de AAP
# -------------------------
- name: Obtener vault password desde env var (AAP Custom Credential)
  ansible.builtin.set_fact:
    _users_admin_vault_pass: "{{ lookup('ansible.builtin.env', 'USERS_ADMIN_VAULT_PASS') | default('', true) }}"
  run_once: true
  no_log: true

- name: Validar que USERS_ADMIN_VAULT_PASS venga definido desde AAP
  ansible.builtin.assert:
    that:
      - (_users_admin_vault_pass | length) > 0
    fail_msg: >-
      No se detecto la env var USERS_ADMIN_VAULT_PASS.
      Verifica que el Job Template tenga asociado el Credential (custom) que inyecta USERS_ADMIN_VAULT_PASS.
  run_once: true
  no_log: true

# --------------------------------------------------------------------
# PRIMERO: ASEGURAR PIP
# --------------------------------------------------------------------
- name: Verificar si pip está instalado
  ansible.builtin.command: "command -v pip3"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _pip_check
  changed_when: false
  failed_when: false

- name: Instalar pip3 si no existe (Debian/Ubuntu)
  ansible.builtin.raw: |
    apt-get update
    apt-get install -y python3-pip
  delegate_to: invd-ts-ansible
  run_once: true
  become: true
  when: 
    - _pip_check.rc != 0
    - ansible_os_family == "Debian"

- name: Instalar pip3 si no existe (RHEL/CentOS)
  ansible.builtin.raw: |
    yum install -y python3-pip || dnf install -y python3-pip
  delegate_to: invd-ts-ansible
  run_once: true
  become: true
  when: 
    - _pip_check.rc != 0
    - ansible_os_family == "RedHat"

- name: Verificar pip nuevamente
  ansible.builtin.command: "pip3 --version"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _pip_verify
  changed_when: false

- name: Fallar si pip no se pudo instalar
  ansible.builtin.fail:
    msg: "No se pudo instalar pip3 en invd-ts-ansible. Instalación manual requerida."
  when: _pip_verify.rc != 0

# --------------------------------------------------------------------
# AHORA: VERIFICAR/INSTALAR ANSIBLE-VAULT
# --------------------------------------------------------------------
- name: Verificar si ansible-vault está realmente instalado
  ansible.builtin.shell: |
    set -e
    # Verificar múltiples ubicaciones posibles
    for cmd in \
      /usr/local/bin/ansible-vault \
      /usr/bin/ansible-vault \
      /bin/ansible-vault \
      $(which ansible-vault 2>/dev/null || echo "") \
      $(command -v ansible-vault 2>/dev/null || echo ""); do
      if [ -x "$cmd" ]; then
        echo "found:$cmd"
        exit 0
      fi
    done
    echo "not found"
    exit 1
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_check_real
  changed_when: false
  failed_when: false

- name: Mostrar resultado de la verificación
  ansible.builtin.debug:
    msg: "Resultado búsqueda ansible-vault: {{ _vault_check_real.stdout }}"
  run_once: true

- name: Instalar ansible completo si no se encuentra ansible-vault
  ansible.builtin.pip:
    name: ansible
    state: present
    executable: pip3
    extra_args: "--no-cache-dir --force-reinstall"
  delegate_to: invd-ts-ansible
  run_once: true
  when: 
    - _vault_check_real.rc != 0 or 'not found' in _vault_check_real.stdout
  register: _vault_install_real

- name: Obtener la ruta real de ansible-vault después de la instalación
  ansible.builtin.shell: |
    set -e
    # Buscar el ejecutable real
    for cmd in \
      /usr/local/bin/ansible-vault \
      /usr/bin/ansible-vault \
      $(which ansible-vault 2>/dev/null || echo ""); do
      if [ -x "$cmd" ]; then
        echo "$cmd"
        exit 0
      fi
    done
    exit 1
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_path
  changed_when: false

- name: Verificar que ansible-vault funciona
  ansible.builtin.shell: "{{ _vault_path.stdout }} --version"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_version
  changed_when: false

- name: Mostrar versión de ansible-vault
  ansible.builtin.debug:
    msg: "ansible-vault instalado correctamente: {{ _vault_version.stdout_lines[0] }}"
  run_once: true

# --------------------------------------------------------------------
# Generacion y cifrado de passwords
# --------------------------------------------------------------------
- name: Verificar/Crear archivo de passwords limpio
  ansible.builtin.file:
    path: "{{ report_dir }}/linux_users_passwords.txt.vault"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true

- name: Generar TXT de passwords (temporal, en claro)
  ansible.builtin.template:
    src: linux_users_passwords.txt.j2
    dest: "{{ report_dir }}/linux_users_passwords.txt"
    mode: "0600"
  delegate_to: invd-ts-ansible
  run_once: true

- name: Crear vault password file temporal (solo runtime)
  ansible.builtin.copy:
    dest: "{{ report_dir }}/.users_admin_vault_pass.tmp"
    content: "{{ _users_admin_vault_pass }}"
    mode: "0600"
  delegate_to: invd-ts-ansible
  run_once: true
  no_log: true

- name: Cifrar TXT a .vault usando la ruta absoluta
  ansible.builtin.shell: |
    set -e
    VAULT_CMD="{{ _vault_path.stdout }}"
    
    # Verificar que el comando existe
    if [ ! -x "$VAULT_CMD" ]; then
      echo "ERROR: No se encuentra ansible-vault en $VAULT_CMD"
      exit 1
    fi
    
    # Verificar que el archivo a cifrar existe y no está vacío
    if [ ! -s "{{ report_dir }}/linux_users_passwords.txt" ]; then
      echo "ERROR: El archivo de passwords está vacío o no existe"
      exit 1
    fi
    
    # Cifrar el archivo
    "$VAULT_CMD" encrypt \
      "{{ report_dir }}/linux_users_passwords.txt" \
      --output "{{ report_dir }}/linux_users_passwords.txt.vault" \
      --vault-password-file "{{ report_dir }}/.users_admin_vault_pass.tmp"
    
    # Verificar que el archivo vault se creó
    if [ ! -f "{{ report_dir }}/linux_users_passwords.txt.vault" ]; then
      echo "ERROR: No se creó el archivo vault"
      exit 1
    fi
    
    echo "Cifrado exitoso"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_encrypt
  no_log: true

- name: Verificar que el archivo vault se creo correctamente
  ansible.builtin.stat:
    path: "{{ report_dir }}/linux_users_passwords.txt.vault"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_file

- name: Fallback - Método alternativo si el principal falló
  ansible.builtin.shell: |
    set -e
    VAULT_CMD="{{ _vault_path.stdout }}"
    
    # Backup del archivo original
    cp "{{ report_dir }}/linux_users_passwords.txt" "{{ report_dir }}/linux_users_passwords.txt.bak"
    
    # Cifrado in-place
    "$VAULT_CMD" encrypt \
      "{{ report_dir }}/linux_users_passwords.txt" \
      --vault-password-file "{{ report_dir }}/.users_admin_vault_pass.tmp"
    
    # Mover el archivo cifrado
    mv "{{ report_dir }}/linux_users_passwords.txt" "{{ report_dir }}/linux_users_passwords.txt.vault"
    
    # Restaurar backup como archivo en claro (se borrará después)
    mv "{{ report_dir }}/linux_users_passwords.txt.bak" "{{ report_dir }}/linux_users_passwords.txt"
    
    echo "Cifrado alternativo exitoso"
  delegate_to: invd-ts-ansible
  run_once: true
  when: not _vault_file.stat.exists
  register: _vault_encrypt_fallback
  no_log: true

- name: Verificar resultado final
  ansible.builtin.stat:
    path: "{{ report_dir }}/linux_users_passwords.txt.vault"
  delegate_to: invd-ts-ansible
  run_once: true
  register: _vault_final

- name: Fallar si no se pudo crear el archivo vault
  ansible.builtin.fail:
    msg: "No se pudo crear el archivo vault de passwords después de múltiples intentos"
  when: not _vault_final.stat.exists

- name: Borrar TXT en claro
  ansible.builtin.file:
    path: "{{ report_dir }}/linux_users_passwords.txt"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true

- name: Borrar archivos temporales
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  delegate_to: invd-ts-ansible
  run_once: true
  loop:
    - "{{ report_dir }}/.users_admin_vault_pass.tmp"
    - "{{ report_dir }}/linux_users_passwords.txt.bak"

- name: Mostrar rutas de salida
  ansible.builtin.debug:
    msg:
      - "Reportes generados en: {{ report_dir }}"
      - "Linux CSV : {{ report_dir }}/linux_users_admin.csv"
      - "Linux HTML: {{ report_dir }}/linux_users_admin.html"
      - "Passwords (Vault): {{ report_dir }}/linux_users_passwords.txt.vault"
      - "Tamaño: {{ _vault_final.stat.size if _vault_final.stat.exists else 'N/A' }} bytes"
  run_once: true