---
# Maneja 1 usuario (usr) y agrega el resultado a users_admin_ops

- name: Validar username
  ansible.builtin.assert:
    that:
      - usr.username is defined
      - (usr.username | string | length) > 0
    fail_msg: "Cada elemento en cfg.users debe incluir 'username'."

- name: Resolver defaults por usuario
  ansible.builtin.set_fact:
    _u_name: "{{ usr.username | string }}"
    _u_type: "{{ (usr.type | default('os')) | lower }}"
    _u_group: "{{ usr.group | default('') | string }}"
    _u_extra_groups: "{{ (usr.extra_groups | default(usr.groups | default([]))) | map('string') | list }}"
    _u_home: "{{ usr.home | default(users_admin_home_base ~ '/' ~ (usr.username | string)) }}"
    _u_comment: "{{ usr.comment | default('') | string }}"

- name: Resolver shell final
  ansible.builtin.set_fact:
    _u_shell: >-
      {{
        usr.shell
        | default(
            (users_admin_ftp_shell_candidates | first)
            if _u_type == 'ftp'
            else '/bin/bash'
        )
      }}

############################################################
# Generar password seguro
############################################################

- name: Generar password seguro
  ansible.builtin.set_fact:
    _u_password_plain: >-
      {{
        lookup(
          'ansible.builtin.password',
          '/dev/null',
          'length=20 chars=ascii_letters,digits,.,:,_,@,-,!,#,%,^,&,*,?,+'
        )
      }}
  no_log: true
  when: users_admin_operation == 'create'

- name: Generar hash SHA512
  ansible.builtin.set_fact:
    _u_password_hash: "{{ _u_password_plain | password_hash('sha512') }}"
  no_log: true
  when: users_admin_operation == 'create'

############################################################
# Crear grupo si no existe
############################################################

- name: Crear grupo primario
  ansible.builtin.group:
    name: "{{ _u_group }}"
    state: present
  when:
    - users_admin_operation == 'create'
    - (_u_group | length) > 0

- name: Crear grupos extra si no existen
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ _u_extra_groups }}"
  when:
    - users_admin_operation == 'create'
    - (_u_extra_groups | length) > 0

############################################################
# Crear usuario
############################################################

- name: Crear usuario
  ansible.builtin.user:
    name: "{{ _u_name }}"
    group: "{{ _u_group }}"
    groups: "{{ _u_extra_groups if (_u_extra_groups | length) > 0 else omit }}"
    append: true
    home: "{{ _u_home }}"
    shell: "{{ _u_shell }}"
    comment: "{{ _u_comment if (_u_comment | length) > 0 else omit }}"
    create_home: true
    password: "{{ _u_password_hash }}"
    update_password: on_create
    state: present
  register: _user_res
  when: users_admin_operation == 'create'
  no_log: true

############################################################
# Expiración password
############################################################

- name: Configurar expiracion password
  ansible.builtin.command: "chage -m 0 -M 99999 -E -1 {{ _u_name }}"
  become: true
  when: users_admin_operation == 'create'

- name: Obtener informacion de expiracion
  ansible.builtin.command: "chage -l {{ _u_name }}"
  register: _chage_info
  changed_when: false
  failed_when: false
  when: users_admin_operation == 'create'

############################################################
# Ajuste SSH AllowUsers (solo OS)
############################################################

- name: Leer AllowUsers actual
  ansible.builtin.shell: "grep -E '^AllowUsers' /etc/ssh/sshd_config || true"
  register: _allowusers_line
  changed_when: false
  when:
    - users_admin_operation == 'create'
    - _u_type == 'os'
  become: true

- name: Construir nueva linea AllowUsers
  ansible.builtin.set_fact:
    _allowusers_new: >-
      {{
        (_allowusers_line.stdout + " " + _u_name)
        if (_u_name not in _allowusers_line.stdout)
        else _allowusers_line.stdout
      }}
  when:
    - users_admin_operation == 'create'
    - _u_type == 'os'

- name: Actualizar AllowUsers
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers'
    line: "{{ _allowusers_new }}"
  when:
    - users_admin_operation == 'create'
    - _u_type == 'os'
  become: true
  register: _sshd_update

- name: Reiniciar sshd si cambio configuracion
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  when:
    - users_admin_operation == 'create'
    - _u_type == 'os'
    - _sshd_update.changed
  become: true

############################################################
# Eliminación usuario
############################################################

- name: Eliminar usuario
  ansible.builtin.user:
    name: "{{ _u_name }}"
    state: absent
    remove: false
  when: users_admin_operation == 'delete'
  register: _user_res

############################################################
# Construir resultado para reportes
############################################################

- name: Construir resultado
  ansible.builtin.set_fact:
    _op_result:
      username: "{{ _u_name }}"
      action: "{{ users_admin_operation }}"
      user_type: "{{ _u_type }}"
      group: "{{ _u_group }}"
      extra_groups: "{{ _u_extra_groups }}"
      home: "{{ _u_home }}"
      shell: "{{ _u_shell }}"
      changed: "{{ _user_res.changed | default(false) }}"
      status: "ok"
      message: ""
      chage_info: "{{ _chage_info.stdout | default('') | regex_replace('[\\r\\n]+',' | ') }}"
      password_generated: true
      password_plain: "{{ _u_password_plain }}"
  no_log: true

- name: Agregar resultado a lista del host
  ansible.builtin.set_fact:
    users_admin_ops: "{{ users_admin_ops + [_op_result] }}"
  no_log: true